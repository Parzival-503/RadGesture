name: Build Windows

# One-click manual build. Run it from GitHub:
#   Actions tab  ->  "Build Windows"  ->  "Run workflow".
# When it finishes, download the "RadGesture-Windows-x64" artifact and run the
# "...Setup.exe" inside it on your Windows PC.
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # Run the JS-based actions on Node 24 to silence the Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build Windows (x64)
    runs-on: windows-2022
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node (version from .node-version)
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies (also compiles the native module)
        run: npm install

      - name: Build the Windows app
        run: npm run make

      - name: Upload the installer + portable build
        uses: actions/upload-artifact@v4
        with:
          name: RadGesture-Windows-x64
          path: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/zip/win32/**/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish to the rolling "windows-dev" release (direct download link)
        uses: svenstaro/upload-release-action@2.9.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: windows-dev
          release_name: RadGesture (Windows, latest build)
          body: |
            Automatically built Windows installer from the latest commit on main.
            Download the "...Setup.exe" asset below and run it on your Windows PC.
          prerelease: true
          overwrite: true
          file_glob: true
          file: out/make/squirrel.windows/*/*.exe
